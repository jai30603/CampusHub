<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>CampusHub | Campus Peer-to-Peer Marketplace</title>
    <meta name="description" content="CampusHub is the student marketplace for buying and selling textbooks, electronics, notes, and campus gear — exclusively for university students." />
    <meta name="keywords" content="student marketplace, campus buy sell, textbooks, university, college gear, peer to peer, student deals" />
    <meta name="author" content="CampusHub" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme Color (mobile browser toolbar) -->
    <meta name="theme-color" content="#6366f1" />

    <meta property="og:type" content="website" />

    <meta property="og:site_name" content="CampusHub" />

    <meta name="twitter:card" content="summary_large_image" />
